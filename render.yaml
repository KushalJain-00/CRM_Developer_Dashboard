services:
  - type: web
    name: crm-intelligence-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: ALLOWED_ORIGINS
        value: "https://crmdevloper.vercel.app,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,http://localhost:8000,null"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
