services:
  - type: web
    name: crm-intelligence-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: ALLOWED_ORIGINS
        value: "*" # Remember to change this to your Vercel URL!
      - key: API_KEY
        generateValue: true # Render will automatically generate a secure secret key for you
