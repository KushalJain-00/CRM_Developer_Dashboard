services:
  - type: web
    name: crm-intelligence-api
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: ALLOWED_ORIGINS
        value: "https://crmdevloper.vercel.app,http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,null"
      - key: API_KEY
        value: "06f618cab6632be0071ef34007f981e3"
